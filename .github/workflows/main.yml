name: 🎵 Deploy Spotify Clone

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

env:
  CLOUD_NAME: so2_mk
  COLLECTION_URL: https://collection.cloudinary.com/dmla61v7n

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/configure-pages@v4
    
    - name: 🐍 Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: 🎵 Build Site
      run: |
        echo "🎵 Building Spotify Clone..."
        echo "☁️ Cloudinary: ${{ env.CLOUD_NAME }}"
        echo "📎 Collection: ${{ env.COLLECTION_URL }}"
        python scraper.py
        echo ""
        echo "📁 Created files:"
        ls -la static/
    
    - uses: actions/upload-pages-artifact@v3
      with:
        path: './static'
    
    - name: 🚀 Deploy
      id: deployment
      uses: actions/deploy-pages@v4
    
    - name: 🎉 Success
      run: echo "🎉 https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/"
