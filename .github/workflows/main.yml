name: 🎵 Deploy Spotify Clone

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

env:
  CLOUD_NAME: so2_mk
  COLLECTION_URL: https://collection.cloudinary.com/dmla61v7n

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    steps:
    - uses: actions/checkout@v4
    
    - name: 🐍 Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: 🎵 Build Site (Run scraper.py)
      run: |
        python scraper.py
        echo "Created files:"
        ls -la static/
        ls -la static/css/
        ls -la static/js/
    
    - name: 📤 Commit & Push Created Files
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add static/ .github/ requirements.txt README.md templates/ scripts/ data/
        git diff --cached --quiet && echo "No changes to commit" || (git commit -m "🎵 Build Spotify Clone [automated]" && git push)
    
    - uses: actions/configure-pages@v4
    
    - uses: actions/upload-pages-artifact@v3
      with:
        path: './static'
    
    - name: 🚀 Deploy
      id: deployment
      uses: actions/deploy-pages@v4
    
    - name: 🎉 Success
      run: echo "🎉 https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/"
