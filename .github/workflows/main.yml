name: 🎵 Deploy Spotify Clone

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

env:
  CLOUD_NAME: so2_mk
  COLLECTION_URL: https://collection.cloudinary.com/dmla61v7n

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    steps:
    - name: 📥 Checkout Repository
      uses: actions/checkout@v4
    
    - name: ⚙️ Setup GitHub Pages
      uses: actions/configure-pages@v4
    
    - name: 🔍 Verify Files
      run: |
        echo "📁 Files in static/:"
        ls -la static/
        echo ""
        echo "✅ All files ready for deployment"
    
    - name: 📤 Upload to GitHub Pages
      uses: actions/upload-pages-artifact@v3
      with:
        path: './static'
    
    - name: 🚀 Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
    
    - name: 🎉 Deployment Success
      run: |
        echo "========================================="
        echo "🎵 Spotify Clone Deployed Successfully!"
        echo "========================================="
        echo "☁️ Cloudinary: ${{ env.CLOUD_NAME }}"
        echo "📎 Collection: ${{ env.COLLECTION_URL }}"
        echo "🌐 URL: ${{ steps.deployment.outputs.page_url }}"
        echo "========================================="
